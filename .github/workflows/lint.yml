name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate plugin structure, versioning, and privacy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Single source of truth: the same script maintainers run locally
      # (and that the pre-push hook runs). Do NOT inline checks here —
      # add them to .maintainers/lint.sh instead.
      - name: Run lint.sh
        run: ./.maintainers/lint.sh
